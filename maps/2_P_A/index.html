<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passive-Active Map (Mouse move, Gaze legend)</title>

    <!-- MapLibre GL JS - library for interactive maps -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />

    <!-- Shared custom styles (two levels up, used by all maps) -->
    <link rel="stylesheet" href="../../style.css" />
</head>
<body>

    <!-- Full-screen map container -->
    <div id="map"></div>

    <!-- Red dot showing current gaze position -->
    <div id="gaze-dot"></div>

    <!-- Legend - tiles are generated dynamically by layers.js -->
    <div id="eye-legend-container">
        <div id="eye-legend-list"></div>
    </div>

    <!-- AprilTag markers - loaded dynamically by tagsloader.js -->
    <div id="apriltags-container"></div>

    <!-- MapLibre GL JS library -->
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

    <!-- YAML parser (used by tagsloader.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <!-- Loads and positions AprilTag images for eye-tracker calibration -->
    <script src="../../tagsloader.js"></script>

    <!-- Layer definitions and legend logic -->
    <script src="layers.js"></script>

    <!-- Main map control logic -->
    <script src="map.js"></script>

</body>
</html>
