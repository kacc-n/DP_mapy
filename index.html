<!DOCTYPE html>
<html>
<head>
    <title>Testování Map</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="viewer" src="maps/A_A/index.html"></iframe>

    <script>
        // Cesty k vašim jednotlivým HTML souborům
        const pages = [
            'maps/A_A/index.html',
            'maps/A_P/index.html',
            'maps/P_A/index.html',
            'maps/P_P/index.html'
        ];
        
        let current = 0;
        const iframe = document.getElementById('viewer');

        document.addEventListener('keydown', (e) => {
            // Šipka vpravo nebo Mezerník přepne na další
            if (e.key === 'ArrowRight' || e.code === 'Space') {
                if (current < pages.length - 1) {
                    current++;
                    iframe.src = pages[current];
                }
            }
            // Šipka vlevo vrátí zpět
            else if (e.key === 'ArrowLeft') {
                if (current > 0) {
                    current--;
                    iframe.src = pages[current];
                }
            }
        });
    </script>
</body>
</html>
